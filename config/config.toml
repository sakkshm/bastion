########################################
# Bastion v0 Configuration
########################################

[server]
host = "0.0.0.0"
port = 8080

[execution]
mode = "sandbox"                    
max_concurrent_sessions = 10
session_ttl_minutes = 10
session_cleanup_interval_sec = 60
working_directory_base = "./sessions"

[sandbox]
enabled = true
image = "alpine:3.14"
network_enabled = false
memory_mbs = 512
cpus = 0.5
pids = 128
job_ttl = 5

[filesystem]
max_upload_size_mbs = 10

[logging]
level = "info"
format = "text"    
file = "./logs.json"
