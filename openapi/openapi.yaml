openapi: 3.0.3

info:
  title: Bastion API
  version: 1.0.0
  description: Sandbox Runtime Environment API

security:
  - BearerAuth: []

paths:

  /health:
    get:
      tags: [system]
      operationId: healthCheck
      summary: Health check for services
      security: []
      responses:
        "200":
          description: OK

  /session/create:
    post:
      tags: [sessions]
      operationId: createSession
      summary: Create session
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "429":
          description: Maximum sessions reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/start:
    post:
      tags: [sessions]
      operationId: startSession
      summary: Start a session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionStatusResponse"
        "500":
          description: Failed to start session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/stop:
    post:
      tags: [sessions]
      operationId: stopSession
      summary: Stop a session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionStatusResponse"
        "500":
          description: Failed to stop session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/status:
    get:
      tags: [sessions]
      operationId: getSessionStatus
      summary: Get session status
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionStatusResponse"
        "500":
          description: Failed to get session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}:
    delete:
      tags: [sessions]
      operationId: deleteSession
      summary: Delete a session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSessionResponse"
        "500":
          description: Failed to delete session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/exec:
    post:
      tags: [jobs]
      operationId: executeCommand
      summary: Execute a command in the session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobExecRequest"
      responses:
        "200":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "403":
          description: Session not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/job/{job_id}:
    get:
      tags: [jobs]
      operationId: getJobStatus
      summary: Get job status
      parameters:
        - $ref: "#/components/parameters/SessionID"
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/terminal:
    get:
      tags: [terminal]
      operationId: connectTerminal
      summary: WebSocket terminal connection
      description: Upgrades connection to WebSocket
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "101":
          description: Switching Protocols

  /session/{id}/upload:
    post:
      tags: [files]
      operationId: uploadFile
      summary: Upload file
      parameters:
        - $ref: "#/components/parameters/SessionID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, metadata]
              properties:
                file:
                  type: string
                  format: binary
                metadata:
                  type: object
                  additionalProperties: false
                  properties:
                    path:
                      type: string
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          description: Invalid request
        "409":
          description: File exists

  /session/{id}/download:
    get:
      tags: [files]
      operationId: downloadFile
      summary: Download file
      parameters:
        - $ref: "#/components/parameters/SessionID"
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: File not found

  /session/{id}/delete:
    delete:
      tags: [files]
      operationId: deleteFile
      summary: Delete file
      parameters:
        - $ref: "#/components/parameters/SessionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequest"
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDeleteResponse"

  /session/{id}/list:
    get:
      tags: [files]
      operationId: listFiles
      summary: List files (paginated)
      parameters:
        - $ref: "#/components/parameters/SessionID"
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: File list (paginated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFileResponse"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    SessionID:
      name: id
      in: path
      required: true
      schema:
        type: string

    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string

  schemas:

    SessionStatus:
      type: string
      enum: [created, running, stopped, deleted, busy]

    JobStatus:
      type: string
      enum: [queued, running, completed, failed]

    CreateSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          $ref: "#/components/schemas/SessionStatus"
        created_at:
          type: string
          format: date-time

    GetSessionStatusResponse:
      type: object
      properties:
        id:
          type: string
        container_id:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/SessionStatus"

    DeleteSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          $ref: "#/components/schemas/SessionStatus"

    JobExecRequest:
      type: object
      required: [cmd]
      properties:
        cmd:
          type: array
          items:
            type: string

    JobExecResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"

    JobStatusResponse:
      type: object
      properties:
        job_id:
          type: string
        cmd:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        created_at:
          type: string
          format: date-time
        output:
          $ref: "#/components/schemas/JobOutputResponse"
          nullable: true

    JobOutputResponse:
      type: object
      properties:
        console_output:
          type: string
        errout:
          type: string
        status_code:
          type: integer

    FileUploadResponse:
      type: object
      properties:
        status:
          type: string
        path:
          type: string

    FileDeleteResponse:
      type: object
      properties:
        status:
          type: string

    ListFileResponse:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileEntry"

    FileEntry:
      type: object
      properties:
        name:
          type: string
        is_dir:
          type: boolean
        size:
          type: integer
          format: int64
        mode:
          type: string
        mod_time:
          type: string
          format: date-time

    DeleteRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string

    APIError:
      type: object
      properties:
        error:
          type: string