openapi: 3.0.3

info:
  title: Bastion API
  version: 1.0.0
  description: Sandbox Runtime Environment API

security:
  - BearerAuth: []

paths:

  /health:
    get:
      summary: Health check for services
      security: []
      responses:
        "200":
          description: OK

  /session/create:
    post:
      summary: Create session
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "429":
          description: Maximum sessions reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/start:
    post:
      summary: Start a session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionStatusResponse"
        "500":
          description: Failed to start session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/stop:
    post:
      summary: Stop a session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionStatusResponse"
        "500":
          description: Failed to stop session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/status:
    get:
      summary: Get session status
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSessionStatusResponse"
        "500":
          description: Failed to get session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}:
    delete:
      summary: Delete a session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSessionResponse"
        "500":
          description: Failed to delete session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
  /session/{id}/exec:
    post:
      summary: Execute a command in the session
      parameters:
        - $ref: "#/components/parameters/SessionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobExecRequest"
      responses:
        "200":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"
        "403":
          description: Session not running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/job/{job_id}:
    get:
      summary: Get job status
      parameters:
        - $ref: "#/components/parameters/SessionID"
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIError"

  /session/{id}/terminal:
    get:
      summary: WebSocket terminal connection
      description: Upgrades connection to WebSocket
      parameters:
        - $ref: "#/components/parameters/SessionID"
      responses:
        "101":
          description: Switching Protocols


components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    SessionID:
      name: id
      in: path
      required: true
      schema:
        type: string

    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string

  schemas:

    SessionStatus:
      type: string
      enum: [created, running, stopped, deleted, busy]

    JobStatus:
      type: string
      enum: [queued, running, completed, failed]

    CreateSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          $ref: "#/components/schemas/SessionStatus"
        created_at:
          type: string
          format: date-time

    GetSessionStatusResponse:
      type: object
      properties:
        id:
          type: string
        container_id:
          type: string
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/SessionStatus"

    DeleteSessionResponse:
      type: object
      properties:
        session_id:
          type: string
        status:
          $ref: "#/components/schemas/SessionStatus"

    JobExecRequest:
      type: object
      required: [cmd]
      properties:
        cmd:
          type: array
          items:
            type: string

    JobExecResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"

    JobStatusResponse:
      type: object
      properties:
        job_id:
          type: string
        cmd:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        created_at:
          type: string
          format: date-time
        output:
          $ref: "#/components/schemas/JobOutputResponse"
          nullable: true

    JobOutputResponse:
      type: object
      properties:
        console_output:
          type: string
        errout:
          type: string
        status_code:
          type: integer

    APIError:
      type: object
      properties:
        error:
          type: string